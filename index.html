<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Receiptify</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #faf7f0;
    --ink: #1a1a1a;
    --faint: #888;
    --accent: #111;
    --bg: #2c2c2c;
    --shadow: rgba(0,0,0,0.35);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Courier Prime', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 35px,
      rgba(255,255,255,0.015) 35px,
      rgba(255,255,255,0.015) 70px
    );
  }

  h1.app-title {
    font-family: 'VT323', monospace;
    font-size: 2.8rem;
    color: #e8e0cc;
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-align: center;
  }
  .app-sub {
    color: #888;
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
    text-align: center;
  }

  .layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    width: 100%;
    max-width: 980px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── EDITOR PANEL ── */
  .editor {
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    padding: 28px 24px;
    width: 420px;
    flex-shrink: 0;
  }

  .editor h2 {
    font-family: 'VT323', monospace;
    font-size: 1.5rem;
    color: #ccc;
    letter-spacing: 2px;
    margin-bottom: 20px;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
  }

  label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #777;
    margin-bottom: 4px;
    margin-top: 14px;
  }

  input[type="text"], input[type="date"] {
    width: 100%;
    background: #131313;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #e0d8c8;
    font-family: 'Courier Prime', monospace;
    font-size: 0.9rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #888; }

  .subjects-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 22px;
    margin-bottom: 10px;
  }
  .subjects-header span {
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #777;
  }
  .add-btn {
    background: none;
    border: 1px solid #555;
    border-radius: 4px;
    color: #aaa;
    font-family: 'Courier Prime', monospace;
    font-size: 0.75rem;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .add-btn:hover { border-color: #aaa; color: #e0d8c8; }

  .subject-row {
    background: #131313;
    border: 1px solid #2e2e2e;
    border-radius: 6px;
    padding: 12px 12px 10px;
    margin-bottom: 8px;
    position: relative;
  }
  .subject-row .row-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .subject-row .row-top input { font-size: 0.82rem; }
  .criteria-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr) 0.6fr 0.6fr;
    gap: 6px;
    align-items: center;
  }
  .criteria-row input[type="number"] {
    text-align: center;
    padding: 5px 4px;
    font-size: 0.82rem;
    -moz-appearance: textfield;
  }
  .criteria-row input[type="number"]::-webkit-outer-spin-button,
  .criteria-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .criteria-row input.input-error {
    border-color: #cc4444 !important;
    background: #2a1010 !important;
  }
  .criteria-label {
    display: grid;
    grid-template-columns: repeat(4, 1fr) 0.6fr 0.6fr;
    gap: 6px;
    margin-bottom: 3px;
  }
  .criteria-label span {
    font-size: 0.6rem;
    text-align: center;
    color: #555;
    letter-spacing: 1px;
  }
  .grade-sum {
    text-align: center;
    font-size: 0.75rem;
    color: #777;
    font-family: 'Courier Prime', monospace;
  }
  .grade-pill {
    text-align: center;
    font-size: 0.82rem;
    font-weight: bold;
    color: #e0d8c8;
    background: #2a2a2a;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 2px 0;
    font-family: 'Courier Prime', monospace;
  }
  .del-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    transition: color 0.2s;
  }
  .del-btn:hover { color: #cc6666; }

  .generate-btn {
    width: 100%;
    margin-top: 22px;
    background: #e8e0cc;
    color: #111;
    border: none;
    border-radius: 4px;
    font-family: 'VT323', monospace;
    font-size: 1.4rem;
    letter-spacing: 3px;
    padding: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .generate-btn:hover { background: #fff; }

  /* ── RECEIPT ── */
  .receipt-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    filter: drop-shadow(0 12px 40px rgba(0,0,0,0.5));
  }

  .receipt {
    background: var(--paper);
    color: var(--ink);
    width: 320px;
    padding: 28px 24px 24px;
    position: relative;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }

  /* Torn top edge */
  .receipt::before {
    content: '';
    display: block;
    position: absolute;
    top: -10px; left: 0; right: 0;
    height: 10px;
    background: radial-gradient(circle at 6px -1px, var(--bg) 7px, var(--paper) 7px);
    background-size: 12px 10px;
    background-repeat: repeat-x;
  }

  .receipt-bottom {
    background: var(--paper);
    width: 320px;
    height: 14px;
    clip-path: polygon(
      0% 0%, 3.125% 100%, 6.25% 0%, 9.375% 100%, 12.5% 0%,
      15.625% 100%, 18.75% 0%, 21.875% 100%, 25% 0%,
      28.125% 100%, 31.25% 0%, 34.375% 100%, 37.5% 0%,
      40.625% 100%, 43.75% 0%, 46.875% 100%, 50% 0%,
      53.125% 100%, 56.25% 0%, 59.375% 100%, 62.5% 0%,
      65.625% 100%, 68.75% 0%, 71.875% 100%, 75% 0%,
      78.125% 100%, 81.25% 0%, 84.375% 100%, 87.5% 0%,
      90.625% 100%, 93.75% 0%, 96.875% 100%, 100% 0%
    );
  }

  .receipt-center { text-align: center; }

  .r-store {
    font-family: 'VT323', monospace;
    font-size: 1.55rem;
    letter-spacing: 2px;
    line-height: 1.2;
    margin-bottom: 2px;
    text-transform: uppercase;
  }
  .r-subtitle {
    font-size: 0.62rem;
    letter-spacing: 3px;
    color: var(--faint);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .r-divider {
    border: none;
    border-top: 1px dashed #bbb;
    margin: 10px 0;
  }
  .r-divider-solid {
    border: none;
    border-top: 1px solid #999;
    margin: 10px 0;
  }

  .r-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--faint);
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .r-section-title {
    font-size: 0.58rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--faint);
    text-align: center;
    margin: 8px 0 6px;
  }

  /* Criteria header row */
  .r-criteria-header {
    display: grid;
    grid-template-columns: 1fr repeat(5, 22px);
    gap: 2px;
    font-size: 0.56rem;
    color: var(--faint);
    letter-spacing: 1px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .r-criteria-header span { text-align: center; }

  .r-subject {
    margin-bottom: 7px;
  }
  .r-subject-name {
    font-size: 0.72rem;
    letter-spacing: 0.5px;
    font-weight: bold;
    line-height: 1.2;
    margin-bottom: 1px;
  }
  .r-subject-teacher {
    font-size: 0.58rem;
    color: var(--faint);
    margin-bottom: 3px;
  }
  .r-subject-scores {
    display: grid;
    grid-template-columns: 1fr repeat(5, 22px);
    gap: 2px;
    font-size: 0.65rem;
    align-items: center;
  }
  .r-subject-scores .score-label {
    font-size: 0.55rem;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .r-subject-scores .score-val {
    text-align: center;
    font-size: 0.72rem;
  }
  .r-subject-scores .score-final {
    text-align: center;
    font-size: 0.82rem;
    font-weight: bold;
    border: 1px solid var(--ink);
    border-radius: 2px;
    line-height: 1.5;
  }

  /* Summary */
  .r-summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    padding: 2px 0;
  }
  .r-summary-row.total {
    font-size: 0.82rem;
    font-weight: bold;
    padding-top: 4px;
  }
  .r-summary-row.average { color: var(--faint); font-size: 0.62rem; }

  .r-barcode {
    text-align: center;
    margin-top: 14px;
    margin-bottom: 2px;
  }
  .r-barcode svg { display: block; margin: 0 auto; }
  .r-barcode-num {
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: var(--faint);
    margin-top: 3px;
  }

  .r-footer {
    font-size: 0.6rem;
    color: var(--faint);
    text-align: center;
    letter-spacing: 2px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* Download btn */
  .dl-btn {
    margin-top: 16px;
    background: none;
    border: 1px solid #555;
    border-radius: 4px;
    color: #aaa;
    font-family: 'Courier Prime', monospace;
    font-size: 0.75rem;
    padding: 7px 18px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .dl-btn:hover { border-color: #e8e0cc; color: #e8e0cc; }
</style>
</head>
<body>

<h1 class="app-title">MYP RECEIPTIFY</h1>
<p class="app-sub">IB MYP Report Card Generator</p>

<div class="layout">

  <!-- EDITOR -->
  <div class="editor">
    <h2>// CONFIGURE</h2>

    <label>School Name</label>
    <input type="text" id="schoolName" value="International School of Helsingborg">

    <label>Student Name</label>
    <input type="text" id="studentName" value="" placeholder="e.g. Jane Smith">

    <label>Academic Year</label>
    <input type="text" id="academicYear" value="2024–2025">

    <label>Grade / Year Level</label>
    <input type="text" id="gradeLevel" value="MYP Year 5">

    <label>Date</label>
    <input type="date" id="reportDate" value="2025-06-15">

    <div class="subjects-header">
      <span>Subjects</span>
      <button class="add-btn" onclick="addSubject()">+ Add</button>
    </div>

    <div id="subjectList"></div>

    <button class="generate-btn" onclick="renderReceipt()">▶ GENERATE RECEIPT</button>
  </div>

  <!-- RECEIPT PREVIEW -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
    <div class="receipt-wrap">
      <div class="receipt" id="receipt">
        <!-- rendered by JS -->
      </div>
      <div class="receipt-bottom"></div>
    </div>
    <button class="dl-btn" onclick="downloadReceipt()">⬇ Download PNG</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const DEFAULT_SUBJECTS = [
  { name: "English Language & Literature", teacher: "", a: 7, b: 8, c: 8, d: 8, grade: 7 },
  { name: "Swedish Language & Literature", teacher: "", a: 7, b: 7, c: 8, d: 8, grade: 7 },
  { name: "French Language Acquisition", teacher: "", a: 7, b: 7, c: 7, d: 8, grade: 7 },
  { name: "Mathematics Extended", teacher: "", a: 8, b: 8, c: 8, d: 8, grade: 7 },
  { name: "Integrated Sciences", teacher: "", a: 8, b: 8, c: 8, d: 8, grade: 7 },
  { name: "Individuals & Societies", teacher: "", a: 8, b: 7, c: 8, d: 7, grade: 7 },
  { name: "Music", teacher: "", a: 8, b: 8, c: 8, d: 8, grade: 7 },
  { name: "Physical Health Education", teacher: "", a: 8, b: 8, c: 7, d: 8, grade: 7 },
];

function calcGrade(a, b, c, d) {
  const sum = (+a || 0) + (+b || 0) + (+c || 0) + (+d || 0);
  if (sum >= 28) return 7;
  if (sum >= 24) return 6;
  if (sum >= 19) return 5;
  if (sum >= 15) return 4;
  if (sum >= 10) return 3;
  if (sum >= 6)  return 2;
  if (sum >= 1)  return 1;
  return 0;
}

function buildSubjectEditor(s, idx) {
  const grade = calcGrade(s.a, s.b, s.c, s.d);
  const sum = (+s.a||0)+(+s.b||0)+(+s.c||0)+(+s.d||0);
  return `
  <div class="subject-row" id="sr-${idx}">
    <button class="del-btn" onclick="removeSubject(${idx})">✕</button>
    <div class="row-top">
      <input type="text" placeholder="Subject name" value="${s.name}" oninput="updateSubject(${idx},'name',this.value)">
      <input type="text" placeholder="Teacher(s)" value="${s.teacher || ''}" oninput="updateSubject(${idx},'teacher',this.value)">
    </div>
    <div class="criteria-label">
      <span>Crit A</span><span>Crit B</span><span>Crit C</span><span>Crit D</span><span>Sum</span><span>/7</span>
    </div>
    <div class="criteria-row">
      <input type="number" min="0" max="8" value="${s.a}" oninput="updateCriteria(${idx},'a',this)" onblur="clampCriteria(this)">
      <input type="number" min="0" max="8" value="${s.b}" oninput="updateCriteria(${idx},'b',this)" onblur="clampCriteria(this)">
      <input type="number" min="0" max="8" value="${s.c}" oninput="updateCriteria(${idx},'c',this)" onblur="clampCriteria(this)">
      <input type="number" min="0" max="8" value="${s.d}" oninput="updateCriteria(${idx},'d',this)" onblur="clampCriteria(this)">
      <span class="grade-sum" id="sum-${idx}">${sum}</span>
      <span class="grade-pill" id="grade-${idx}">${grade || '–'}</span>
    </div>
  </div>`;
}

let subjects = JSON.parse(JSON.stringify(DEFAULT_SUBJECTS));

function rebuildEditor() {
  document.getElementById('subjectList').innerHTML =
    subjects.map((s, i) => buildSubjectEditor(s, i)).join('');
}

function clampCriteria(input) {
  let v = parseInt(input.value, 10);
  if (isNaN(v) || v < 0) v = 0;
  if (v > 8) v = 8;
  input.value = v;
  input.classList.remove('input-error');
}

function updateCriteria(idx, field, input) {
  let v = parseInt(input.value, 10);
  const invalid = isNaN(v) || v < 0 || v > 8;
  input.classList.toggle('input-error', invalid);
  if (!invalid) {
    subjects[idx][field] = v;
    // update sum + grade pill live
    const s = subjects[idx];
    const sum = (+s.a||0)+(+s.b||0)+(+s.c||0)+(+s.d||0);
    const grade = calcGrade(s.a, s.b, s.c, s.d);
    const sumEl = document.getElementById(`sum-${idx}`);
    const gradeEl = document.getElementById(`grade-${idx}`);
    if (sumEl) sumEl.textContent = sum;
    if (gradeEl) gradeEl.textContent = grade || '–';
    renderReceipt();
  }
}

function updateSubject(idx, field, val) {
  subjects[idx][field] = val;
  renderReceipt();
}

function removeSubject(idx) {
  subjects.splice(idx, 1);
  rebuildEditor();
  renderReceipt();
}

function addSubject() {
  subjects.push({ name: "New Subject", teacher: "", a: 0, b: 0, c: 0, d: 0 });
  rebuildEditor();
  renderReceipt();
  document.getElementById(`sr-${subjects.length-1}`)?.scrollIntoView({behavior:'smooth'});
}

// Generate barcode SVG (simple decorative)
function barcodesvg() {
  const widths = [2,1,3,1,2,1,1,3,2,1,2,3,1,2,1,3,2,1,1,2,3,1,2,1,2,3,1,1,2,3,1,2,1,2];
  let x = 0, bars = '';
  widths.forEach((w, i) => {
    if (i % 2 === 0) bars += `<rect x="${x}" y="0" width="${w}" height="42" fill="#1a1a1a"/>`;
    x += w;
  });
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${x}" height="42" viewBox="0 0 ${x} 42">${bars}</svg>`;
}

function renderReceipt() {
  const school = document.getElementById('schoolName').value || 'My School';
  const student = document.getElementById('studentName').value || 'Student';
  const year = document.getElementById('academicYear').value || '';
  const level = document.getElementById('gradeLevel').value || '';
  const dateVal = document.getElementById('reportDate').value;
  const dateStr = dateVal ? new Date(dateVal).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}).toUpperCase() : '';

  const totalGrade = subjects.reduce((acc, x) => acc + calcGrade(x.a, x.b, x.c, x.d), 0);
  const maxGrade = subjects.length * 7;
  const avg = subjects.length ? (totalGrade / subjects.length).toFixed(2) : '0.00';

  // build subject rows
  const subjectHTML = subjects.map(s => {
    const grade = calcGrade(s.a, s.b, s.c, s.d);
    return `
    <div class="r-subject">
      <div class="r-subject-name">${s.name.toUpperCase()}</div>
      ${s.teacher ? `<div class="r-subject-teacher">${s.teacher}</div>` : ''}
      <div class="r-subject-scores">
        <span class="score-label">criteria</span>
        <span class="score-val">${s.a}</span>
        <span class="score-val">${s.b}</span>
        <span class="score-val">${s.c}</span>
        <span class="score-val">${s.d}</span>
        <span class="score-final">${grade || '–'}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('receipt').innerHTML = `
    <div class="receipt-center">
      <div class="r-store">${school}</div>
      <div class="r-subtitle">${level}${level && year ? ' · ' : ''}${year}</div>
    </div>

    <hr class="r-divider-solid">

    <div class="r-meta"><span>STUDENT</span><span>${student.toUpperCase()}</span></div>
    <div class="r-meta"><span>DATE</span><span>${dateStr}</span></div>
    <div class="r-meta"><span>TYPE</span><span>FINAL REPORT</span></div>

    <hr class="r-divider">

    <div class="r-section-title">— Subject Achievement —</div>

    <div class="r-criteria-header">
      <span></span>
      <span>A</span><span>B</span><span>C</span><span>D</span><span>/7</span>
    </div>

    ${subjectHTML}

    <hr class="r-divider-solid">

    <div class="r-summary-row"><span>SUBJECTS</span><span>${subjects.length}</span></div>
    <div class="r-summary-row average"><span>AVG GRADE</span><span>${avg} / 7</span></div>
    <div class="r-summary-row total"><span>TOTAL</span><span>${totalGrade} / ${maxGrade}</span></div>

    <hr class="r-divider">

    <div class="r-barcode">
      ${barcodesvg()}
      <div class="r-barcode-num">${student.replace(/\s/g,'').toUpperCase().substring(0,4)}-${year.replace(/[^0-9]/g,'').substring(0,4)}-MYP</div>
    </div>

    <div class="r-footer">Thank you for your hard work</div>
  `;
}

function barcodesvg() {
  const seed = document.getElementById('studentName').value.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const widths = Array.from({length:38},(_,i)=>(((seed*17+i*31)%3)+1));
  let x=0, bars='';
  widths.forEach((w,i)=>{ if(i%2===0) bars+=`<rect x="${x}" y="0" width="${w}" height="40" fill="#1a1a1a"/>`; x+=w; });
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${x}" height="40" viewBox="0 0 ${x} 40">${bars}</svg>`;
}

async function downloadReceipt() {
  const wrap = document.querySelector('.receipt-wrap');
  const canvas = await html2canvas(wrap, {
    scale: 3,
    backgroundColor: null,
    useCORS: true,
  });
  const link = document.createElement('a');
  link.download = 'myp-report-receipt.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Init
rebuildEditor();
renderReceipt();
</script>
</body>
</html>
